name: Build WE22 APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: mkdir -p dist && echo '<html></html>' > dist/index.html
      - run: npx cap add android 2>/dev/null || true && npx cap sync android
      - name: Appliquer icone WAREAST
        run: |
          pip install Pillow -q
          python3 << 'PYEOF'
          from PIL import Image
          import os, shutil
          img = Image.open('icon.png').convert('RGBA')
          base = 'android/app/src/main/res'
          for f,s in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]:
            os.makedirs(f'{base}/{f}', exist_ok=True)
            r = img.resize((s,s), Image.LANCZOS)
            r.save(f'{base}/{f}/ic_launcher.png')
            r.save(f'{base}/{f}/ic_launcher_round.png')
            print(f'✓ {f} {s}px')
          # Supprimer les adaptive icons XML qui écrasent les PNG
          for xml in [
            f'{base}/mipmap-anydpi-v26/ic_launcher.xml',
            f'{base}/mipmap-anydpi-v26/ic_launcher_round.xml',
          ]:
            if os.path.exists(xml):
              os.remove(xml)
              print(f'✓ Supprimé: {xml}')
          # Supprimer les drawables vectoriels par défaut
          for d in ['ic_launcher_background.xml','ic_launcher_foreground.xml']:
            p = f'{base}/../drawable/{d}'
            if os.path.exists(p):
              os.remove(p)
          print('✓ Icone WAREAST appliquee!')
          PYEOF
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: WE22-Frontline-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
