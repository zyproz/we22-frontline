name: Build WE22 APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # permet de déclencher manuellement depuis GitHub

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances Capacitor
        run: npm install

      - name: Créer le dossier dist (requis par Capacitor)
        run: |
          mkdir -p dist
          echo '<!DOCTYPE html><html><body>Loading...</body></html>' > dist/index.html

      - name: Initialiser Capacitor Android
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Configurer les permissions Android (fullscreen + orientation)
        run: |
          # Ajouter permissions réseau et orientation dans AndroidManifest.xml
          sed -i 's/<uses-permission android:name="android.permission.INTERNET"\/>/<uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>/' android/app/src/main/AndroidManifest.xml || true

      - name: Build APK Debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WE22-Frontline-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
          
      - name: Afficher info APK
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "✅ APK créé avec succès: $SIZE"
          else
            echo "❌ APK non trouvé"
            exit 1
          fi
